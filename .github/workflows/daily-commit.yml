name: Daily Random Commits

on:
  schedule:
    - cron: '30 2 * * *'  # Runs daily at 02:30 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "22f2000429@ds.study.iitm.ac.in"

      - name: Make Random Commits (1–10)
        run: |
          COUNT=$(( (RANDOM % 10) + 1 ))
          echo "Making $COUNT commits today"

          for i in $(seq 1 $COUNT)
          do
            echo "Commit $i at $(date)" >> last_run.txt
            git add last_run.txt
            git commit -m "Automated random commit $i at $(date)"
          done

      - name: Push Changes
        run: |
          git push
